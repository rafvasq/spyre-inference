# Read the Docs configuration file for spyre-inference
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    pre_build:
      # Clone sendnn-inference docs at a pinned ref for legacy documentation
      - git clone --depth 1 --branch v2.0.0 https://github.com/torch-spyre/sendnn-inference.git /tmp/sendnn-inference
      # Copy legacy docs into the build tree under docs/legacy/
      - mkdir -p docs/legacy
      - cp -r /tmp/sendnn-inference/docs/. docs/legacy/
      # Copy examples for legacy docs
      - mkdir -p docs/legacy/examples
      - cp -r /tmp/sendnn-inference/examples/* docs/legacy/examples/
      # Copy model_configs.yaml so the generate_model_tables hook can build legacy supported_models
      - cp /tmp/sendnn-inference/sendnn_inference/config/model_configs.yaml docs/legacy/model_configs.yaml

mkdocs:
  configuration: mkdocs.yaml
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements-docs.txt

